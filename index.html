<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 10px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; border: 3px solid #38bdf8; }
    button { padding: 12px 20px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<h1>📸 Scanner</h1>
<video id="video" autoplay playsinline></video>

<div class="controls">
  <button onclick="startCamera()">🎥 Abrir Cámara</button>
  <button style="background:#22c55e; color:white;" onclick="capture()">📸 Capturar</button>
  <button style="background:#f59e0b;" onclick="exportExcel()">⬇️ Exportar Excel</button>
</div>

<div id="status">Esperando...</div>
<ul id="list" style="text-align:left;"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");
render();

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
  document.getElementById("status").innerText = "Cámara lista.";
}

async function capture() {
  document.getElementById("status").innerText = "Procesando...";
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  Tesseract.recognize(canvas, "eng").then(result => {
    const match = result.data.text.match(/[A-Z]{3}\s?\d{1,3}/);
    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      render();
      document.getElementById("status").innerText = "✅ Detectado: " + code;
    } else {
      document.getElementById("status").innerText = "❌ No detectado.";
    }
  });
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).forEach(([k,v]) => { list.innerHTML += `<li>${k} x${v}</li>`; });
}

function exportExcel() {
  const rows = [["Código", "Cantidad"], ...Object.entries(data)];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Cromos");
  XLSX.writeFile(wb, "Coleccion.xlsx");
}
</script>
</body>
</html>
