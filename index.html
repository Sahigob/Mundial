<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Cromos FIFA 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; border: 4px solid #fff; background: #000; }
    .controls { padding: 20px; }
    button { padding: 15px 25px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    .btn-main { background: #38bdf8; }
    .btn-cap { background: #22c55e; color: white; }
    #status { margin: 15px; padding: 10px; background: #1e293b; border-radius: 8px; font-weight: bold; }
    ul { list-style: none; padding: 0; text-align: left; }
    li { padding: 8px; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>

<h1>📸 Scanner de Cromos</h1>

<video id="video" autoplay playsinline></video>

<div class="controls">
  <button class="btn-main" onclick="startCamera()">🎥 Abrir Cámara</button>
  <button class="btn-cap" onclick="capture()">📸 Capturar Código</button>
  <button class="btn-main" onclick="exportExcel()">⬇️ Exportar Excel</button>
  <button style="background: #ef4444;" onclick="clearData()">🗑️ Borrar</button>
</div>

<div id="status">Presiona "Abrir Cámara"</div>
<ul id="list"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");
render();

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    document.getElementById("status").innerText = "Cámara lista. Enfoca el código.";
  } catch (e) {
    document.getElementById("status").innerText = "Error: Permiso de cámara denegado.";
  }
}

async function capture() {
  const status = document.getElementById("status");
  if (!video.srcObject) return alert("Abre la cámara primero");
  
  status.innerText = "Procesando...";

  // 1. Capturamos toda la imagen para mantener la resolución máxima
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  // 2. OCR con configuración específica para leer texto en una línea
  Tesseract.recognize(canvas, "eng", {
    tessedit_pageseg_mode: 7, // Tratar la imagen como una única línea de texto
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '
  }).then(result => {
    // 3. BUSQUEDA INTELIGENTE
    // Buscamos 3 letras seguidas de espacio y números (ej: "AUS 6")
    const match = result.data.text.match(/[A-Z]{3}\s?\d{1,3}/);

    if (match) {
      // Normalizamos el formato a "XXX 000"
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      render();
      status.innerText = "✅ Detectado: " + code;
    } else {
      status.innerText = "❌ No se leyó. Enfoca mejor el código AUS 6.";
      console.log("OCR leyó:", result.data.text);
    }
  });
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).sort((a,b) => b[1]-a[1]).forEach(([k,v]) => {
    list.innerHTML += `<li>${k} x${v}</li>`;
  });
}

function clearData() {
  if (confirm("¿Borrar todo?")) {
    data = {};
    localStorage.removeItem("cromos");
    render();
  }
}

function exportExcel() {
  const rows = [["Código", "Cantidad"], ...Object.entries(data)];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Cromos");
  XLSX.writeFile(wb, "Cromos_Recogidos.xlsx");
}
</script>
</body>
</html>
