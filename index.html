<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Cromos Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 10px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; border: 3px solid #38bdf8; }
    .controls { padding: 10px; }
    button { padding: 12px 20px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    .btn-main { background: #38bdf8; }
    .btn-cap { background: #22c55e; color: white; }
    .btn-excel { background: #f59e0b; }
    #status { margin: 10px; padding: 10px; background: #1e293b; border-radius: 8px; }
  </style>
</head>
<body>

<h1>📸 Scanner Pro</h1>
<video id="video" autoplay playsinline></video>

<div class="controls">
  <button class="btn-main" onclick="startCamera()">🎥 Cámara</button>
  <button class="btn-cap" onclick="capture()">📸 Capturar (Zoom)</button>
  <button class="btn-excel" onclick="exportExcel()">⬇️ Exportar Excel</button>
  <button style="background:#ef4444;" onclick="clearData()">🗑️ Borrar</button>
</div>

<div id="status">Esperando...</div>
<ul id="list" style="text-align:left; font-size:14px; list-style:none;"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");
render();

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
  document.getElementById("status").innerText = "Cámara lista. Centra el código.";
}

async function capture() {
  document.getElementById("status").innerText = "Procesando...";
  
  // ZOOM: En lugar de recortar, escalamos el canvas para que el OCR vea la imagen grande
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth * 2; 
  canvas.height = video.videoHeight * 2;
  const ctx = canvas.getContext("2d");
  
  // Dibujamos el video al doble de tamaño (Zoom manual)
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  Tesseract.recognize(canvas, "eng").then(result => {
    const match = result.data.text.match(/[A-Z]{3}\s?\d{1,3}/);
    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      render();
      document.getElementById("status").innerText = "✅ Detectado: " + code;
    } else {
      document.getElementById("status").innerText = "❌ No detectado. Prueba con más luz.";
    }
  });
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).sort((a,b) => b[1]-a[1]).forEach(([k,v]) => {
    list.innerHTML += `<li>${k} x${v}</li>`;
  });
}

function clearData() {
  if(confirm("¿Borrar todo?")) { data = {}; localStorage.removeItem("cromos"); render(); }
}

function exportExcel() {
  const rows = [["Código", "Cantidad"], ...Object.entries(data)];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Cromos");
  XLSX.writeFile(wb, "Coleccion.xlsx");
}
</script>
</body>
</html>
