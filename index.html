<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Cromos Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
    #video { width: 100%; max-width: 500px; border-radius: 12px; border: 4px solid #38bdf8; }
    .controls { padding: 15px; }
    button { padding: 15px 25px; margin: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<h1>📸 Scanner de Cromos</h1>
<video id="video" autoplay playsinline></video>
<div class="controls">
  <button onclick="startCamera()">🎥 Abrir Cámara</button>
  <button onclick="capture()" style="background:#22c55e;">📸 Capturar con Zoom</button>
</div>
<div id="status">Esperando...</div>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ 
    video: { facingMode: "environment" } 
  });
  video.srcObject = stream;
}

async function capture() {
  document.getElementById("status").innerText = "Procesando...";
  
  const canvas = document.createElement("canvas");
  canvas.width = 1200; 
  canvas.height = 600;
  const ctx = canvas.getContext("2d");

  // ZOOM DIGITAL: Capturamos el centro y lo estiramos al canvas
  const zoom = 2.0; 
  const sWidth = video.videoWidth / zoom;
  const sHeight = video.videoHeight / zoom;
  const sx = (video.videoWidth - sWidth) / 2;
  const sy = (video.videoHeight - sHeight) / 2;

  // Dibujamos el centro ampliado al canvas
  ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);

  // Procesamos con Tesseract
  Tesseract.recognize(canvas, "eng").then(result => {
    const text = result.data.text;
    const match = text.match(/[A-Z]{3}\s?\d{1,3}/);

    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      document.getElementById("status").innerText = "✅ Detectado: " + code + " (Total: " + data[code] + ")";
    } else {
      document.getElementById("status").innerText = "❌ No detectado. Centra mejor el código.";
    }
  });
}
</script>
</body>
</html>
