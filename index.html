<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Firebase</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- COPIA AQUÍ TU CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
      databaseURL: "TU_URL_DE_DATABASE_FIREBASE"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db; // Para acceso global
  </script>

  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    video { width: 100%; max-width: 400px; border-radius: 12px; }
    button { padding: 12px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; }
    .box { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; }
  </style>
</head>
<body>

<h1>📸 Scanner Cloud</h1>
<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">Abrir Cámara</button>
<button onclick="capture()" style="background:#22c55e; color:white;">Capturar</button>
<button onclick="exportExcel()">⬇️ Excel</button>

<div class="box" id="status">Esperando...</div>
<ul id="list" style="text-align:left;"></ul>

<script>
let video = document.getElementById("video");
let localData = {};

// Sincronizar con Firebase en tiempo real
setTimeout(() => {
  if(window.db) {
    onValue(ref(window.db, 'cromos'), (snapshot) => {
      localData = snapshot.val() || {};
      render();
    });
  }
}, 1000);

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
}

async function capture() {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const { data: { text } } = await Tesseract.recognize(canvas, "eng");
  const match = text.match(/[A-Z]{3}\s?\d{1,3}/);

  if (match) {
    const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
    
    // Sumar 1 en Firebase
    const updates = {};
    updates['/cromos/' + code.replace(' ', '_')] = (localData[code.replace(' ', '_')] || 0) + 1;
    update(ref(window.db), updates);
    
    document.getElementById("status").innerText = "Guardado en nube: " + code;
  }
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(localData).forEach(([k, v]) => {
    list.innerHTML += `<li>${k.replace('_', ' ')} x${v}</li>`;
  });
}

function exportExcel() {
  const rows = [["Código", "Cantidad"], ...Object.entries(localData).map(([k,v]) => [k.replace('_', ' '), v])];
  XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.aoa_to_sheet(rows), "Cromos"), "MiColeccion.xlsx");
}
</script>
</body>
</html>
