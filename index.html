<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Repetidos</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; border: 2px solid #38bdf8; }
    button { padding: 15px 25px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    .btn-cam { background: #38bdf8; }
    .btn-cap { background: #22c55e; color: white; }
    #status { margin: 15px; padding: 10px; background: #1e293b; border-radius: 8px; min-height: 20px; }
  </style>
</head>
<body>

<h1>📸 Scanner</h1>
<video id="video" autoplay playsinline></video>
<br>
<button class="btn-cam" onclick="startCamera()">Abrir Cámara</button>
<button class="btn-cap" onclick="capture()">Capturar</button>

<div id="status">Esperando...</div>
<ul id="list" style="list-style:none; padding:0; text-align:left; font-size:14px;"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("repetidos") || "{}");
render();

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
  document.getElementById("status").innerText = "Enfoca el código arriba a la derecha";
}

async function capture() {
  const status = document.getElementById("status");
  status.innerText = "Procesando...";

  const tempCanvas = document.createElement("canvas");
  const ctx = tempCanvas.getContext("2d");

  // Ajustes de recorte (si no lo lee, cambia estos valores ligeramente)
  const clipWidth = video.videoWidth * 0.4;
  const clipHeight = video.videoHeight * 0.2;
  const clipX = video.videoWidth * 0.6; 
  const clipY = video.videoHeight * 0.05;

  tempCanvas.width = clipWidth;
  tempCanvas.height = clipHeight;
  ctx.drawImage(video, clipX, clipY, clipWidth, clipHeight, 0, 0, clipWidth, clipHeight);

  try {
    const { data: { text } } = await Tesseract.recognize(tempCanvas, "eng", {
      tessedit_pageseg_mode: 7, // Modo línea única
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
    });

    // Limpieza: junta el texto y busca el patrón
    let clean = text.replace(/[^A-Z0-9]/g, '');
    // Intenta encontrar 3 letras seguidas de 1 a 3 números
    let match = clean.match(/([A-Z]{3})(\d{1,3})/);

    if (match) {
      let code = match[1] + " " + match[2];
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("repetidos", JSON.stringify(data));
      render();
      status.innerText = "✅ Detectado: " + code;
    } else {
      status.innerText = "❌ No detectado. Intentó leer: " + clean;
    }
  } catch (e) {
    status.innerText = "Error: " + e.message;
  }
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).sort((a,b) => b[1]-a[1]).forEach(([k,v]) => {
    list.innerHTML += `<li>${k} - Cantidad: ${v}</li>`;
  });
}
</script>
</body>
</html>
