<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner con Zoom x4</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; border: 4px solid #38bdf8; }
    .controls { padding: 10px; }
    button { padding: 15px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: #38bdf8; color: white; }
  </style>
</head>
<body>

<h1>📸 Scanner Zoom x4</h1>
<video id="video" autoplay playsinline></video>

<div class="controls">
  <button onclick="startCamera()">🎥 Abrir Cámara (Zoom x4)</button>
  <button style="background:#22c55e;" onclick="capture()">📸 Capturar</button>
  <button style="background:#f59e0b;" onclick="exportExcel()">⬇️ Excel</button>
</div>

<div id="status">Espera a que cargue la cámara...</div>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ 
    video: { 
      facingMode: "environment"
    } 
  });
  video.srcObject = stream;
  
  // Aplicamos el zoom x4 sobre la pista de video
  const track = stream.getVideoTracks()[0];
  const capabilities = track.getCapabilities ? track.getCapabilities() : null;
  
  if (capabilities && capabilities.zoom) {
    track.applyConstraints({ advanced: [{ zoom: 4.0 }] });
    document.getElementById("status").innerText = "Zoom x4 aplicado.";
  } else {
    document.getElementById("status").innerText = "Zoom automático no disponible, acerca el móvil manualmente.";
  }
}

async function capture() {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  document.getElementById("status").innerText = "Analizando...";

  Tesseract.recognize(canvas, "eng", { tessedit_pageseg_mode: 7 }).then(res => {
    const match = res.data.text.match(/[A-Z]{3}\s?\d{1,3}/);
    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      document.getElementById("status").innerText = "✅ Detectado: " + code;
    } else {
      document.getElementById("status").innerText = "❌ No detectado. Ajusta el enfoque.";
    }
  });
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Código", "Cantidad"], ...Object.entries(data)]), "Cromos");
  XLSX.writeFile(wb, "Coleccion.xlsx");
}
</script>
</body>
</html>
