<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Pro Cromos FIFA</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 10px; }
    #container { position: relative; display: inline-block; width: 100%; max-width: 400px; }
    #video { width: 100%; border-radius: 12px; border: 4px solid #38bdf8; background: #000; }
    #frame { position: absolute; top: 5%; right: 5%; width: 40%; height: 15%; border: 4px solid #ff0000; pointer-events: none; border-radius: 8px; }
    .controls { padding: 10px; }
    button { padding: 12px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: #38bdf8; color: white; }
    ul { list-style: none; padding: 0; max-width: 400px; margin: 20px auto; text-align: left; }
    li { background: #1e293b; margin: 5px 0; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .btn-minus { background: #ef4444; padding: 5px 10px; border-radius: 5px; }
  </style>
</head>
<body>

<h1>📸 Scanner Pro</h1>
<div id="container">
  <video id="video" autoplay playsinline></video>
  <div id="frame"></div>
</div>

<div class="controls">
  <button onclick="startCamera()">🎥 Abrir Cámara (Zoom x4)</button>
  <button style="background:#22c55e;" onclick="capture()">📸 Capturar</button>
  <button style="background:#f59e0b;" onclick="exportExcel()">⬇️ Exportar Excel</button>
</div>

<div id="status">Encuadra el código en el recuadro rojo.</div>
<ul id="list"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");
render();

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
  const track = stream.getVideoTracks()[0];
  if (track.getCapabilities && track.getCapabilities().zoom) {
    track.applyConstraints({ advanced: [{ zoom: 4.0 }] });
    document.getElementById("status").innerText = "Zoom x4 aplicado.";
  }
}

async function capture() {
  const status = document.getElementById("status");
  status.innerText = "Procesando...";
  
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // Aplicar filtro de contraste alto para eliminar reflejos de cromos
  ctx.filter = 'grayscale(1) contrast(2) brightness(1.2)';
  ctx.drawImage(canvas, 0, 0);

  // Coordenadas de recorte para el recuadro rojo
  const w = video.videoWidth * 0.4;
  const h = video.videoHeight * 0.15;
  const x = video.videoWidth * 0.55; 
  const y = video.videoHeight * 0.05;

  const croppedCanvas = document.createElement("canvas");
  croppedCanvas.width = w;
  croppedCanvas.height = h;
  croppedCanvas.getContext("2d").drawImage(canvas, x, y, w, h, 0, 0, w, h);

  Tesseract.recognize(croppedCanvas, "eng", { tessedit_pageseg_mode: 7 }).then(res => {
    const match = res.data.text.match(/[A-Z]{3}\s?\d{1,3}/);
    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      saveAndRender();
      status.innerText = "✅ Detectado: " + code;
      if (window.navigator.vibrate) window.navigator.vibrate(200);
    } else {
      status.innerText = "❌ No detectado. Ajusta el cromo en el recuadro rojo.";
    }
  });
}

function saveAndRender() {
  localStorage.setItem("cromos", JSON.stringify(data));
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).sort().forEach(([code, count]) => {
    list.innerHTML += `<li>${code} <b>x${count}</b> <button class="btn-minus" onclick="removeOne('${code}')">-</button></li>`;
  });
}

function removeOne(code) {
  if (data[code] > 1) data[code] -= 1;
  else delete data[code];
  saveAndRender();
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Código", "Cantidad"], ...Object.entries(data)]), "Cromos");
  XLSX.writeFile(wb, "Coleccion_Cromos.xlsx");
}
</script>
</body>
</html>
