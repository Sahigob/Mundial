<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scanner Cromos Panini</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:#eee; padding:20px; }
h2 { color:#00d4ff; }
textarea { width:100%; height:150px; }
button { padding:10px; margin:5px; cursor:pointer; }
input, button { font-size:14px; }
#log { margin-top:15px; white-space:pre-wrap; background:#222; padding:10px; }
table { width:100%; margin-top:15px; border-collapse: collapse; }
td, th { border:1px solid #444; padding:5px; }
img { max-width:200px; margin-top:10px; }
</style>
</head>

<body>

<h2>📸 Scanner Cromos Panini (Repetidos)</h2>

<p>1. Pega tu listado completo aquí:</p>
<textarea id="db"></textarea>
<button onclick="buildDB()">📚 Cargar base de datos</button>

<hr>

<p>2. Sube foto del cromo:</p>
<input type="file" accept="image/*" capture="environment" id="fileInput">

<br>
<img id="preview"/>

<br>
<button onclick="processImage()">🔎 Analizar cromo</button>

<button onclick="exportExcel()">📁 Exportar Excel</button>

<div id="log"></div>

<table id="table">
<thead>
<tr>
<th>Código</th>
<th>Jugador</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let DB = {};      // mapa AUS 6 -> jugador
let results = [];

// -------------------------
// Construir base de datos
// -------------------------
function buildDB() {
    DB = {};
    const text = document.getElementById("db").value.split("\n");

    for (let line of text) {
        // ejemplo: 294 - AUS 6 - Jordan Bos - Australia
        let match = line.match(/(\d+)\s*-\s*([A-Z]{3})\s*0*(\d+)\s*-\s*(.+)/);
        if (match) {
            let key = match[2] + " " + match[3];
            DB[key.trim()] = line.trim();
        }
    }

    log("✅ Base de datos cargada: " + Object.keys(DB).length + " registros");
}

// -------------------------
// OCR imagen
// -------------------------
document.getElementById("fileInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    if(file){
        const url = URL.createObjectURL(file);
        document.getElementById("preview").src = url;
    }
});

async function processImage(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Sube una imagen");

    log("🔄 Analizando imagen...");

    const { data } = await Tesseract.recognize(file, "eng", {
        logger: m => console.log(m)
    });

    let text = data.text.toUpperCase();

    // 🔥 extracción inteligente del código
    let match = text.match(/([A-Z]{3})\s*0*([0-9]{1,3})/);

    if(!match){
        log("❌ No se detectó código");
        return;
    }

    let code = match[1] + " " + match[2];
    log("📌 Código detectado: " + code);

    let player = DB[code] || "❓ No encontrado en DB";

    log("👤 Resultado: " + player);

    results.push({ code, player });

    updateTable();
}

// -------------------------
function updateTable(){
    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    results.forEach(r=>{
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${r.code}</td><td>${r.player}</td>`;
        tbody.appendChild(tr);
    });
}

// -------------------------
function exportExcel(){
    let ws = XLSX.utils.json_to_sheet(results);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Repetidos");

    XLSX.writeFile(wb, "cromos_repetidos.xlsx");
}

// -------------------------
function log(t){
    document.getElementById("log").innerText = t;
}

</script>

</body>
</html>
