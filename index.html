<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner con Visor</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
    #container { position: relative; display: inline-block; width: 100%; max-width: 400px; }
    #video { width: 100%; border-radius: 12px; }
    /* El marco donde debes poner el código */
    #frame { position: absolute; top: 10%; right: 5%; width: 40%; height: 15%; border: 3px solid #ff0000; pointer-events: none; }
    button { padding: 15px; margin: 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<h1>📸 Scanner</h1>
<div id="container">
  <video id="video" autoplay playsinline></video>
  <div id="frame"></div>
</div>

<div class="controls">
  <button onclick="startCamera()">🎥 Cámara</button>
  <button style="background:#22c55e;" onclick="capture()">📸 Capturar</button>
  <button style="background:#f59e0b;" onclick="exportExcel()">⬇️ Excel</button>
</div>

<div id="status">Encuadra el código en el rectángulo rojo.</div>
<ul id="list"></ul>

<script>
let video = document.getElementById("video");
let data = JSON.parse(localStorage.getItem("cromos") || "{}");

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
}

async function capture() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  
  // Usamos el tamaño real del video
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // Recorte basado en el mismo sitio donde pusimos el recuadro rojo:
  // top 10%, right 5%, width 40%, height 15%
  const w = video.videoWidth * 0.4;
  const h = video.videoHeight * 0.15;
  const x = video.videoWidth * 0.55; // Ajuste para que coincida con el borde derecho
  const y = video.videoHeight * 0.1;

  const croppedCanvas = document.createElement("canvas");
  croppedCanvas.width = w;
  croppedCanvas.height = h;
  croppedCanvas.getContext("2d").drawImage(canvas, x, y, w, h, 0, 0, w, h);

  Tesseract.recognize(croppedCanvas, "eng", { tessedit_pageseg_mode: 7 }).then(res => {
    const match = res.data.text.match(/[A-Z]{3}\s?\d{1,3}/);
    if (match) {
      const code = match[0].replace(/([A-Z]{3})(\d+)/, '$1 $2');
      data[code] = (data[code] || 0) + 1;
      localStorage.setItem("cromos", JSON.stringify(data));
      render();
      document.getElementById("status").innerText = "✅ Detectado: " + code;
    } else {
      document.getElementById("status").innerText = "❌ No detectado. ¿Está dentro del rojo?";
    }
  });
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.entries(data).forEach(([k,v]) => list.innerHTML += `<li>${k} x${v}</li>`);
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Código", "Cantidad"], ...Object.entries(data)]), "Cromos");
  XLSX.writeFile(wb, "Coleccion.xlsx");
}
</script>
</body>
</html>
