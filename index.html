<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Repetidos</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; text-align:center; padding:20px;">

  <h1>📸 Scanner</h1>
  <video id="video" autoplay playsinline style="width:100%; max-width:400px; border-radius:12px;"></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <br>
  <button onclick="startCamera()" style="padding:15px; margin:5px;">Abrir Cámara</button>
  <button onclick="capture()" style="padding:15px; margin:5px; background:#38bdf8; border:none; border-radius:10px;">Capturar</button>
  
  <div id="status" style="margin:20px; font-weight:bold;">Listo</div>
  <ul id="list" style="text-align:left; list-style:none;"></ul>

  <script>
    let video = document.getElementById("video");
    let data = JSON.parse(localStorage.getItem("repetidos") || "{}");

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = stream;
    }

    async function capture() {
      let canvas = document.getElementById("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      document.getElementById("status").innerText = "Procesando...";

      // Usamos Tesseract directamente sobre el canvas completo
      Tesseract.recognize(canvas, "eng").then(result => {
        let text = result.data.text;
        
        // FILTRO: Buscamos específicamente el patrón de 3 letras + espacio + numero
        // Ejemplo: "AUS 6"
        let regex = /[A-Z]{3}\s?\d{1,3}/;
        let match = text.match(regex);

        if (match) {
          let code = match[0].replace(/(\D{3})(\d+)/, '$1 $2');
          data[code] = (data[code] || 0) + 1;
          localStorage.setItem("repetidos", JSON.stringify(data));
          render();
          document.getElementById("status").innerText = "Detectado: " + code;
        } else {
          document.getElementById("status").innerText = "No se vio el código, intenta otra vez";
        }
      });
    }

    function render() {
      let list = document.getElementById("list");
      list.innerHTML = "";
      Object.entries(data).forEach(([code, count]) => {
        let li = document.createElement("li");
        li.innerText = `${code} x${count}`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
